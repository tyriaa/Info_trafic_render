<!-- Section Flash Trafic pour Normandie - À insérer dans normandie.html -->

<!-- STYLES CSS À AJOUTER DANS LA SECTION <style> -->
<style>
    .flash-trafic {
        background-color: #f8f8f8;
        padding: 1.5rem 2rem;
        border-radius: 10px;
        margin: 2rem;
    }
    
    .flash-trafic-title {
        color: #0066FF;
        font-weight: 600;
        font-size: 1.2rem;
        margin-bottom: 1rem;
    }
    
    .flash-generate-btn {
        background: #0066FF;
        color: #fff;
        border: none;
        padding: 8px 16px;
        border-radius: 20px;
        cursor: pointer;
        font-weight: 600;
        margin-bottom: 12px;
        transition: all 0.2s ease;
    }

    .flash-generate-btn:hover {
        background: #0053cc;
    }

    .config-toggle-btn {
        background: #28a745;
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 15px;
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 500;
        margin-bottom: 10px;
        transition: all 0.2s ease;
    }

    .config-toggle-btn:hover {
        background: #218838;
    }

    .config-panel {
        background: #f8f9fa;
        border: 2px solid #0066FF;
        border-radius: 10px;
        padding: 1rem;
        margin: 1rem 0 0 0;
        display: none;
        width: 100%;
    }

    .config-panel.show {
        display: block;
    }

    .config-label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        color: #0066FF;
        margin-bottom: 0.3rem;
    }

    .config-select, .config-input {
        width: 100%;
        padding: 0.4rem;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 0.85rem;
    }

    .config-value {
        font-size: 0.8rem;
        color: #666;
        margin-left: 0.5rem;
        min-width: 40px;
    }

    .prompt-btn {
        padding: 0.6rem 1rem;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.2s ease;
        background: white;
        font-weight: 500;
    }

    .prompt-btn:hover {
        background: #f8f9fa;
        border-color: #0066FF;
    }

    .prompt-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 10000;
        align-items: center;
        justify-content: center;
    }

    .prompt-modal.show {
        display: flex;
    }

    .prompt-modal-content {
        background: white;
        border-radius: 15px;
        padding: 2rem;
        max-width: 800px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    .prompt-modal-textarea {
        width: 100%;
        min-height: 400px;
        padding: 1rem;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-family: 'Courier New', monospace;
        font-size: 0.85rem;
        resize: vertical;
    }
</style>

<!-- HTML À INSÉRER AVANT LA SECTION .container -->
<div class="flash-trafic">
    <div class="flash-trafic-title">Flash trafic Normandie</div>
    <div style="display: flex; gap: 1rem; align-items: flex-start;">
        <div style="flex: 1;">
            <button id="config-toggle-btn-normandie" class="config-toggle-btn">⚙️ Configuration</button>
            
            <!-- Panneau de configuration -->
            <div id="config-panel-normandie" class="config-panel">
                <div style="display: grid; grid-template-columns: 200px 1fr; gap: 1.5rem;">
                    <!-- Paramètres IA -->
                    <div>
                        <div class="config-group">
                            <label class="config-label">Modèle IA</label>
                            <select id="model-select-normandie" class="config-select">
                                <option value="claude">Claude 3.7 Sonnet</option>
                                <option value="gpt4o">GPT-4o</option>
                                <option value="pixtral">Pixtral</option>
                            </select>
                        </div>
                        
                        <div class="config-group" style="margin-top: 1rem;">
                            <label class="config-label">Température</label>
                            <div style="display: flex; align-items: center;">
                                <input type="range" id="temperature-slider-normandie" class="config-input" min="0" max="1" step="0.1" value="0.7">
                                <span id="temperature-value-normandie" class="config-value">0.7</span>
                            </div>
                        </div>
                        
                        <div class="config-group" style="margin-top: 1rem;">
                            <label class="config-label">Top-P</label>
                            <div style="display: flex; align-items: center;">
                                <input type="range" id="top-p-slider-normandie" class="config-input" min="0" max="1" step="0.1" value="0.9">
                                <span id="top-p-value-normandie" class="config-value">0.9</span>
                            </div>
                        </div>
                        
                        <div class="config-group" style="margin-top: 1rem;">
                            <label class="config-label">Longueur max (tokens)</label>
                            <select id="max-tokens-select-normandie" class="config-select">
                                <option value="1000">Court (1000)</option>
                                <option value="1500" selected>Moyen (1500)</option>
                                <option value="4096">Sans limite</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- Personnalisation -->
                    <div>
                        <div class="config-group">
                            <label class="config-label">Personnalisation du prompt</label>
                            <button id="show-raw-prompt-btn-normandie" class="prompt-btn">Modifier le prompt brut</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Zone du flash généré -->
        <div style="flex: 1; background: white; border-radius: 10px; padding: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <button id="generate-flash-btn-normandie" class="flash-generate-btn">Générer le flash trafic</button>
            <div id="flash-trafic-content-normandie">
                <p style="color: #000000 !important;">Cliquez sur le bouton ci-dessus pour générer le flash trafic Normandie.</p>
            </div>
        </div>
    </div>
</div>

<!-- Modal pour le prompt brut -->
<div id="prompt-modal-normandie" class="prompt-modal">
    <div class="prompt-modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 2px solid #0066FF;">
            <h2 style="font-size: 1.3rem; font-weight: 600; color: #0066FF;">Modifier le prompt brut</h2>
            <button id="close-prompt-modal-normandie" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">×</button>
        </div>
        <textarea id="raw-prompt-textarea-normandie" class="prompt-modal-textarea"></textarea>
        <div style="display: flex; gap: 1rem; margin-top: 1rem; justify-content: flex-end;">
            <button id="cancel-prompt-btn-normandie" class="prompt-btn">Annuler</button>
            <button id="generate-from-raw-prompt-btn-normandie" class="prompt-btn" style="background: #0066FF; color: white;">Générer avec ce prompt</button>
        </div>
    </div>
</div>

<!-- JAVASCRIPT À AJOUTER DANS LA SECTION <script> -->
<script>
(function() {
    // Prompt par défaut pour Normandie
    const defaultPromptNormandie = `Tu es un journaliste radio spécialisé dans l'information trafic en Normandie. Tu produis des synthèses trafic destinées à aider un journaliste à l'antenne, en direct.
Ton écriture est orale, fluide, naturelle, professionnelle, mais présentée sous forme de bullet points clairs et immédiatement exploitables.

Analyse les données en interne pour identifier uniquement les incidents les plus importants.
Garde en priorité :
	•	les accidents
    •	les véhicules en panne
	•	les embouteillages
	•	les travaux provoquant plus de 5 minutes de retard ou des fermetures majeures
	•	les perturbations transports bloquantes (trafic interrompu, coupure longue, grève)

Ignore systématiquement :
	•	les perturbations mineures
	•	les incidents très locaux
	•	les informations sans impact significatif pour les usagers

Les données incluent à la fois :
	•	des incidents routiers (TomTom Rouen)
	•	des perturbations de transports (MyAstuce)

Paramètres éditoriaux obligatoires :
	•	🎙️ Ton : neutre, factuel, clair
	•	⏱️ Urgence : incidents les plus critiques en premier
	•	🧠 Détail : phrases très courtes, impact usager immédiat
	•	🗺️ Géographie : priorité aux grands axes normands et lignes structurantes
	•	📻 Usage antenne : lecture rapide, pas de phrase longue

⚠️ Règles prioritaires :
	•	Ne produis PAS de texte continu
	•	Ne produis QUE des bullet points
	•	Un incident = un bloc de bullet points
	•	Chaque bloc doit contenir, quand l'information est disponible :
	•	l'axe ou la ligne concernée
	•	la localisation précise
	•	la nature du problème
	•	l'impact concret pour l'usager (retard, fermeture, trafic interrompu)
	•	Classe les incidents par importance réelle
	•	N'ajoute aucune information absente des données
	•	Évite toute répétition
	•	N'ajoute ni conclusion, ni commentaire, ni titre
	•	N'explique jamais ton raisonnement

Format de sortie attendu :
	•	[AXE / LIGNE]
	•	Localisation
	•	Problème
	•	Impact usager

Données trafic à analyser :
{{data}}`;

    let currentPromptNormandie = defaultPromptNormandie;

    // Gestion du panneau de configuration
    document.getElementById('config-toggle-btn-normandie').addEventListener('click', function() {
        document.getElementById('config-panel-normandie').classList.toggle('show');
    });

    // Mise à jour des valeurs des sliders
    document.getElementById('temperature-slider-normandie').addEventListener('input', function() {
        document.getElementById('temperature-value-normandie').textContent = this.value;
    });

    document.getElementById('top-p-slider-normandie').addEventListener('input', function() {
        document.getElementById('top-p-value-normandie').textContent = this.value;
    });

    // Modal prompt brut
    document.getElementById('show-raw-prompt-btn-normandie').addEventListener('click', function() {
        document.getElementById('raw-prompt-textarea-normandie').value = currentPromptNormandie;
        document.getElementById('prompt-modal-normandie').classList.add('show');
    });

    document.getElementById('close-prompt-modal-normandie').addEventListener('click', function() {
        document.getElementById('prompt-modal-normandie').classList.remove('show');
    });

    document.getElementById('cancel-prompt-btn-normandie').addEventListener('click', function() {
        document.getElementById('prompt-modal-normandie').classList.remove('show');
    });

    // Génération du flash trafic
    async function generateFlashTrafficNormandie(customPrompt = null) {
        try {
            document.getElementById('flash-trafic-content-normandie').innerHTML = '<p style="color: #000000 !important;">Génération du flash trafic en cours...</p>';
            
            const config = {
                model: document.getElementById('model-select-normandie').value,
                temperature: parseFloat(document.getElementById('temperature-slider-normandie').value),
                top_p: parseFloat(document.getElementById('top-p-slider-normandie').value),
                max_tokens: parseInt(document.getElementById('max-tokens-select-normandie').value),
                custom_prompt: customPrompt || currentPromptNormandie
            };
            
            const response = await fetch('/api/generate-flash-traffic-normandie', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config)
            });
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            const data = await response.json();
            
            if (data.status === 'success') {
                document.getElementById('flash-trafic-content-normandie').innerHTML = 
                    `<p style="white-space: pre-line; color: #000000 !important;">${data.flash_traffic}</p>`;
            } else {
                throw new Error(data.message || 'Erreur lors de la génération');
            }
        } catch (error) {
            console.error('Erreur:', error);
            document.getElementById('flash-trafic-content-normandie').innerHTML = 
                '<p style="color: #000000 !important;">Erreur lors de la génération du flash trafic. Veuillez vérifier votre configuration.</p>';
        }
    }

    // Bouton principal de génération
    document.getElementById('generate-flash-btn-normandie').addEventListener('click', function() {
        generateFlashTrafficNormandie();
    });

    // Génération depuis le prompt brut
    document.getElementById('generate-from-raw-prompt-btn-normandie').addEventListener('click', function() {
        const editedPrompt = document.getElementById('raw-prompt-textarea-normandie').value;
        currentPromptNormandie = editedPrompt;
        document.getElementById('prompt-modal-normandie').classList.remove('show');
        generateFlashTrafficNormandie(editedPrompt);
    });
})();
</script>
